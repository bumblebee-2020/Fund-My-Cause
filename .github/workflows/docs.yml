name: Deploy Contract Docs

on:
  push:
    branches:
      - main
    paths:
      - "contracts/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow only one concurrent deployment; cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    name: Build rustdoc
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-docs

      - name: Cache Cargo registry & build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-

      # Build docs for both contracts; exclude benchmarks and test utilities.
      # --no-deps keeps the output focused on project code only.
      - name: Build rustdoc
        run: |
          cargo doc \
            --workspace \
            --exclude benchmarks \
            --no-deps \
            --document-private-items \
            2>&1 | tee doc-build.log
        env:
          RUSTDOCFLAGS: "--default-theme=ayu --cfg docsrs -D warnings"

      # Create a redirect from the root so GitHub Pages lands on the crowdfund crate.
      - name: Create root index redirect
        run: |
          cat > target/doc/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=crowdfund/index.html">
              <title>Fund-My-Cause Contract Docs</title>
            </head>
            <body>
              <p>Redirecting to <a href="crowdfund/index.html">crowdfund docs</a>…</p>
            </body>
          </html>
          EOF

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy-docs:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
